<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="popup.css" />
        <title>TrackMyCourse</title>
    </head>
    <body>
        <div class="wrapper">
            <header>
                <div class="header-left">
                    <img src="../../icons/logo_24.png" alt="TrackMyCourse Logo" />
                    <h1>TrackMyCourse</h1>
                </div>
                <div class="header-right">
                    <a
                        href="https://github.com/AlokYadavCodes/track-my-course"
                        target="_blank"
                        rel="noopener noreferrer"
                        class="github-link"
                        title="Star us on GitHub"
                    >
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path
                                d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"
                            />
                        </svg>
                    </a>
                    <div class="kebab-menu-container">
                        <button class="kebab-menu-btn" id="kebab-menu-btn" title="More options">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                                <circle cx="12" cy="5" r="2"></circle>
                                <circle cx="12" cy="12" r="2"></circle>
                                <circle cx="12" cy="19" r="2"></circle>
                            </svg>
                        </button>
                        <div class="kebab-dropdown" id="kebab-dropdown">
                            <div class="kebab-dropdown-item focus-mode-item" id="focus-mode-item">
                                <svg
                                    width="16"
                                    height="16"
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="2"
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                >
                                    <circle cx="12" cy="12" r="10" />
                                    <circle cx="12" cy="12" r="6" />
                                    <circle cx="12" cy="12" r="2" />
                                </svg>
                                <span>Focus Mode</span>
                                <div class="switch">
                                    <input type="checkbox" id="focus-mode-toggle" />
                                    <span class="slider round"></span>
                                </div>
                            </div>
                            <div class="kebab-dropdown-divider"></div>
                            <button class="kebab-dropdown-item" id="export-data-btn">
                                <svg
                                    width="16"
                                    height="16"
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="2"
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                >
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                                    <polyline points="17 8 12 3 7 8" />
                                    <line x1="12" y1="3" x2="12" y2="15" />
                                </svg>
                                Export Data
                            </button>
                            <button class="kebab-dropdown-item" id="import-data-btn">
                                <svg
                                    width="16"
                                    height="16"
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="2"
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                >
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                                    <polyline points="7 10 12 15 17 10" />
                                    <line x1="12" y1="15" x2="12" y2="3" />
                                </svg>
                                Import Data
                            </button>
                        </div>
                    </div>
                </div>
            </header>
            <main>
                <div id="welcome-message">
                    <h2>Welcome to TrackMyCourse!</h2>
                    <p>
                        To get started, go to a YouTube playlist and look for the 'Start Course'
                        button.
                    </p>
                </div>

                <div id="course-lists-container">
                    <div class="courses-outer-container">
                        <div class="courses-summary in-progress-summary">
                            <div class="summary-text">
                                In progress
                                <span class="in-progress-course-count course-count"></span>
                            </div>
                            <svg width="24" height="24" viewBox="0 0 24 24">
                                <path
                                    d="M18 15L12 9L6 15"
                                    stroke="currentColor"
                                    stroke-width="2"
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                />
                            </svg>
                        </div>
                        <div class="in-progress-courses courses"></div>
                    </div>

                    <div class="courses-outer-container">
                        <div class="courses-summary completed-summary">
                            <div class="summary-text">
                                Completed
                                <span class="completed-course-count course-count"></span>
                            </div>
                            <svg width="24" height="24" viewBox="0 0 24 24">
                                <path
                                    d="M6 9L12 15L18 9"
                                    stroke="currentColor"
                                    stroke-width="2"
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                />
                            </svg>
                        </div>
                        <div class="completed-courses courses hide"></div>
                    </div>
                </div>
            </main>
            <footer class="popup-footer">
                <a
                    href="https://trackmycourse.online/donate"
                    target="_blank"
                    rel="noopener noreferrer"
                    class="footer-link"
                    >Donate</a
                >
                <a
                    href="https://forms.gle/dJxwbGj8d3mwGs8b6"
                    target="_blank"
                    rel="noopener noreferrer"
                    class="footer-link"
                    >Request Feature</a
                >
                <a
                    href="https://forms.gle/J7fasJUVoQG7o62d8"
                    target="_blank"
                    rel="noopener noreferrer"
                    class="footer-link"
                    >Report Bugs</a
                >
            </footer>
        </div>
        <script src="../shared/utils.js"></script>
        <script src="popup.js"></script>
    </body>
</html>
